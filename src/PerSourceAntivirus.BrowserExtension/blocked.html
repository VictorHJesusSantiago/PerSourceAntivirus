<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Acesso Bloqueado — PerSource Antivirus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #16213e;
      border: 1px solid #e94560;
      border-radius: 10px;
      padding: 40px 48px;
      max-width: 560px;
      text-align: center;
    }
    .shield { font-size: 64px; display: block; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #e94560; margin-bottom: 12px; }
    p  { font-size: 14px; color: #a0b0d0; line-height: 1.6; margin-bottom: 8px; }
    .url-box {
      background: #0f3460;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      color: #a0b0d0;
      word-break: break-all;
      margin: 16px 0;
    }
    .reason-box {
      background: #3a0a15;
      border: 1px solid #e94560;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ff8080;
      margin-bottom: 20px;
    }
    .actions { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }
    button {
      padding: 10px 22px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-back { background: #e94560; color: #fff; }
    .btn-back:hover { background: #c0392b; }
    .btn-proceed { background: #2a2a4e; color: #a0b0d0; border: 1px solid #555; }
    .btn-proceed:hover { background: #3a3a6e; }
  </style>
</head>
<body>
  <div class="card">
    <span class="shield">🛡</span>
    <h1>Acesso Bloqueado</h1>
    <p>O PerSource Antivirus bloqueou o acesso a esta página porque ela pode ser maliciosa.</p>
    <div class="url-box" id="blockedUrl"></div>
    <div class="reason-box" id="reasonBox" style="display:none"></div>
    <p style="font-size:12px;color:#666">Se você acredita que este bloqueio é um falso positivo, volte e tente adicionar o domínio às exclusões no painel do PerSource Antivirus.</p>
    <div class="actions">
      <button class="btn-back" onclick="history.back()">← Voltar</button>
      <button class="btn-proceed" id="proceedBtn">Prosseguir mesmo assim</button>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const url    = decodeURIComponent(params.get("url") ?? "");
    const reason = decodeURIComponent(params.get("reason") ?? "");

    const urlEl = document.getElementById("blockedUrl");
    urlEl.textContent = url || "(URL desconhecida)";

    if (reason) {
      const r = document.getElementById("reasonBox");
      r.textContent = "Motivo: " + reason;
      r.style.display = "block";
    }

    document.getElementById("proceedBtn").addEventListener("click", () => {
      if (url) location.replace(url);
    });
  </script>
</body>
</html>
